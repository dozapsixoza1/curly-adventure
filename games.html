<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games — CryptoPlay</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #080b14;
      --bg-card: #0d1220;
      --bg-elevated: #111827;
      --accent-cyan: #00e5ff;
      --accent-purple: #7c3aed;
      --accent-green: #10b981;
      --accent-gold: #f59e0b;
      --text-primary: #f0f4ff;
      --text-secondary: #8899bb;
      --text-dim: #445577;
      --border: rgba(0,229,255,0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Exo 2', sans-serif; background: var(--bg-deep); color: var(--text-primary); }

    header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      background: rgba(8,11,20,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg,var(--accent-cyan),var(--accent-purple)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 1px; background: linear-gradient(90deg,var(--accent-cyan),#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    nav { display: flex; gap: 4px; }
    nav a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; padding: 8px 14px; border-radius: 8px; transition: all 0.2s; }
    nav a:hover, nav a.active { color: var(--accent-cyan); background: rgba(0,229,255,0.08); }
    .btn-tg { display: flex; align-items: center; gap: 8px; background: linear-gradient(135deg,#0088cc,#0055aa); color: white; border: none; padding: 9px 18px; border-radius: 10px; font-family: 'Exo 2', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; }

    .page-layout { display: flex; min-height: 100vh; padding-top: 64px; }

    /* SIDEBAR */
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      position: sticky; top: 64px; height: calc(100vh - 64px);
      overflow-y: auto;
    }
    .sidebar-section { margin-bottom: 28px; }
    .sidebar-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px; padding-left: 8px; }
    .filter-btn {
      width: 100%; text-align: left; padding: 9px 12px; border-radius: 8px;
      background: transparent; border: none; color: var(--text-secondary);
      font-family: 'Exo 2', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 10px;
    }
    .filter-btn:hover { background: rgba(0,229,255,0.06); color: var(--text-primary); }
    .filter-btn.active { background: rgba(0,229,255,0.1); color: var(--accent-cyan); }
    .filter-btn .count { margin-left: auto; font-size: 11px; color: var(--text-dim); background: var(--bg-elevated); padding: 2px 6px; border-radius: 4px; }

    /* MAIN */
    .main { flex: 1; padding: 28px; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .page-title { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; }
    .page-title span { background: linear-gradient(90deg,var(--accent-cyan),#a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .search-bar { display: flex; align-items: center; gap: 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; }
    .search-bar input { background: transparent; border: none; outline: none; color: var(--text-primary); font-family: 'Exo 2', sans-serif; font-size: 14px; width: 220px; }
    .search-bar input::placeholder { color: var(--text-dim); }
    .sort-select { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; color: var(--text-secondary); font-family: 'Exo 2', sans-serif; font-size: 13px; cursor: pointer; }

    /* FEATURED BANNER */
    .featured-banner {
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(0,229,255,0.1));
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 16px;
      padding: 24px 28px;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      margin-bottom: 28px;
    }
    .featured-game-emoji { font-size: 56px; }
    .featured-badge { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-gold); margin-bottom: 6px; }
    .featured-name { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .featured-desc { color: var(--text-secondary); font-size: 13px; }
    .btn-play { background: linear-gradient(135deg,var(--accent-cyan),var(--accent-purple)); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-family: 'Exo 2', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }

    /* GAMES GRID */
    .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 16px; }
    .game-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; cursor: pointer; transition: all 0.3s; }
    .game-card:hover { transform: translateY(-5px); border-color: rgba(0,229,255,0.4); box-shadow: 0 16px 40px rgba(0,0,0,0.4); }
    .game-thumb { width: 100%; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; font-size: 52px; position: relative; overflow: hidden; }
    .game-thumb::after { content: '▶ PLAY'; position: absolute; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; letter-spacing: 2px; color: white; opacity: 0; transition: opacity 0.2s; }
    .game-card:hover .game-thumb::after { opacity: 1; }
    .game-info { padding: 12px 14px; }
    .game-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
    .game-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .gtag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 100px; }
    .gtag-type { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
    .badge-new { background: rgba(16,185,129,0.15); color: #10b981; }
    .badge-hot { background: rgba(239,68,68,0.15); color: #ef4444; }
    .badge-top { background: rgba(245,158,11,0.15); color: var(--accent-gold); }
    .badge-web3 { background: rgba(124,58,237,0.15); color: #a78bfa; }
    .game-reward { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--accent-gold); font-weight: 600; }
    .game-players { font-size: 11px; color: var(--text-dim); }
    .game-footer { display: flex; justify-content: space-between; align-items: center; }

    /* ALL GAMES DATA */
    @media (max-width: 768px) { .sidebar { display: none; } .page-layout { flex-direction: column; } }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">
      <div class="logo-icon">🎮</div>
      <span class="logo-text">CryptoPlay</span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="games.html" class="active">Games</a>
      <a href="index.html#features">Features</a>
      <a href="index.html#developers">Developers</a>
    </nav>
    <a href="https://t.me/cryptoplayy" class="btn-tg" target="_blank">✈️ @cryptoplayy</a>
  </header>

  <div class="page-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Categories</div>
        <button class="filter-btn active">🎮 All Games <span class="count">52</span></button>
        <button class="filter-btn">🎰 Slots & Casino <span class="count">14</span></button>
        <button class="filter-btn">⚔️ RPG & Adventure <span class="count">9</span></button>
        <button class="filter-btn">🏎️ Racing <span class="count">6</span></button>
        <button class="filter-btn">🧩 Puzzle <span class="count">8</span></button>
        <button class="filter-btn">🎯 Action <span class="count">7</span></button>
        <button class="filter-btn">🃏 Card Games <span class="count">5</span></button>
        <button class="filter-btn">⚽ Sports <span class="count">3</span></button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Tags</div>
        <button class="filter-btn">✨ New Arrivals</button>
        <button class="filter-btn">🔥 Most Played</button>
        <button class="filter-btn">💎 NFT Games</button>
        <button class="filter-btn">🏆 Tournaments</button>
        <button class="filter-btn">💰 Earn TON</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Rewards</div>
        <button class="filter-btn">💸 Free to Play</button>
        <button class="filter-btn">💵 Play to Earn</button>
        <button class="filter-btn">🎁 Daily Bonuses</button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">
      <div class="page-header">
        <div>
          <div class="page-title">Game <span>Library</span></div>
          <div style="color:var(--text-dim); font-size:13px; margin-top:4px;">52 games available</div>
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <div class="search-bar">
            <span style="color:var(--text-dim);">🔍</span>
            <input type="text" placeholder="Search games...">
          </div>
          <select class="sort-select">
            <option>Most Popular</option>
            <option>Newest First</option>
            <option>Highest Rewards</option>
            <option>A–Z</option>
          </select>
        </div>
      </div>

      <!-- FEATURED -->
      <div class="featured-banner">
        <div style="display:flex; align-items:center; gap:20px;">
          <div class="featured-game-emoji">🐉</div>
          <div>
            <div class="featured-badge">⭐ Featured Game of the Week</div>
            <div class="featured-name">Dragon Realm</div>
            <div class="featured-desc">Epic RPG with NFT weapons, guilds, and TON rewards. Join 50,000+ adventurers.</div>
          </div>
        </div>
        <button class="btn-play">▶ Play Now</button>
      </div>

      <!-- GAMES GRID -->
      <div class="games-grid" id="gamesGrid">
        <!-- Rendered by JS -->
      </div>
    </main>
  </div>

  <script>
    const games = [
      { emoji:'🎰', name:'Crypto Slots', type:'Slots', badge:'badge-hot', badgeLabel:'🔥 HOT', reward:'0.5 TON/day', players:'12.4K' },
      { emoji:'🏎️', name:'TON Racer', type:'Racing', badge:'badge-new', badgeLabel:'✨ NEW', reward:'0.3 TON/race', players:'4.2K' },
      { emoji:'⚔️', name:'NFT Quest', type:'RPG', badge:'badge-web3', badgeLabel:'💎 NFT', reward:'NFT Drops', players:'8.1K' },
      { emoji:'🃏', name:'Crypto Cards', type:'Card Game', badge:'badge-top', badgeLabel:'⭐ TOP', reward:'1 TON/win', players:'9.7K' },
      { emoji:'🎯', name:'TON Strike', type:'Shooter', badge:'badge-hot', badgeLabel:'🔥 HOT', reward:'0.2 TON/kill', players:'6.3K' },
      { emoji:'🧩', name:'Block Puzzle', type:'Puzzle', badge:'badge-new', badgeLabel:'✨ NEW', reward:'Free to Play', players:'2.1K' },
      { emoji:'🎲', name:'Dice Master', type:'Casino', badge:'badge-web3', badgeLabel:'💎 NFT', reward:'2 TON/round', players:'5.5K' },
      { emoji:'🔮', name:'Mystic Farm', type:'Farm', badge:'badge-top', badgeLabel:'⭐ TOP', reward:'0.1 TON/hr', players:'11.2K' },
      { emoji:'⚽', name:'TON Soccer', type:'Sport', badge:'badge-new', badgeLabel:'✨ NEW', reward:'0.5 TON/match', players:'3.8K' },
      { emoji:'🩸', name:'Vampire Rush', type:'Action', badge:'badge-hot', badgeLabel:'🔥 HOT', reward:'0.15 TON/run', players:'7.4K' },
      { emoji:'🐉', name:'Dragon Realm', type:'RPG', badge:'badge-web3', badgeLabel:'💎 NFT', reward:'NFT+TON', players:'50K' },
      { emoji:'🚀', name:'Space Miner', type:'Idle', badge:'badge-top', badgeLabel:'⭐ TOP', reward:'0.05 TON/hr', players:'15.6K' },
      { emoji:'🎸', name:'Beat Drop', type:'Rhythm', badge:'badge-new', badgeLabel:'✨ NEW', reward:'0.1 TON/song', players:'1.9K' },
      { emoji:'🏰', name:'Castle Wars', type:'Strategy', badge:'badge-hot', badgeLabel:'🔥 HOT', reward:'5 TON/season', players:'8.8K' },
      { emoji:'🦊', name:'Fox Runner', type:'Endless Run', badge:'', badgeLabel:'', reward:'Free to Play', players:'22K' },
      { emoji:'🎳', name:'TON Bowl', type:'Sport', badge:'', badgeLabel:'', reward:'0.2 TON/game', players:'3.1K' },
      { emoji:'🃏', name:'Black Jack Pro', type:'Casino', badge:'badge-top', badgeLabel:'⭐ TOP', reward:'10 TON/win', players:'6.7K' },
      { emoji:'🌊', name:'Wave Surfer', type:'Action', badge:'badge-new', badgeLabel:'✨ NEW', reward:'0.3 TON/run', players:'2.4K' },
      { emoji:'🏹', name:'Archer Legend', type:'RPG', badge:'badge-web3', badgeLabel:'💎 NFT', reward:'NFT Skins', players:'4.9K' },
      { emoji:'🎡', name:'Lucky Wheel', type:'Casino', badge:'badge-hot', badgeLabel:'🔥 HOT', reward:'Up to 50 TON', players:'18K' },
    ];

    const gradients = [
      'linear-gradient(135deg,#1a1040,#6d28d9)',
      'linear-gradient(135deg,#0f2027,#2c5364)',
      'linear-gradient(135deg,#1a0000,#7f1d1d)',
      'linear-gradient(135deg,#001a00,#064e3b)',
      'linear-gradient(135deg,#0a001a,#4c1d95)',
      'linear-gradient(135deg,#1a1500,#78350f)',
      'linear-gradient(135deg,#001520,#0c4a6e)',
      'linear-gradient(135deg,#100010,#701a75)',
      'linear-gradient(135deg,#001000,#14532d)',
      'linear-gradient(135deg,#200010,#9d174d)',
    ];

    const grid = document.getElementById('gamesGrid');
    games.forEach((g, i) => {
      const bg = gradients[i % gradients.length];
      grid.innerHTML += `
        <div class="game-card">
          <div class="game-thumb" style="background:${bg};">${g.emoji}</div>
          <div class="game-info">
            <div class="game-name">${g.name}</div>
            <div class="game-tags">
              <span class="gtag gtag-type">${g.type}</span>
              ${g.badge ? `<span class="gtag ${g.badge}">${g.badgeLabel}</span>` : ''}
            </div>
            <div class="game-footer">
              <div class="game-reward">💰 ${g.reward}</div>
              <div class="game-players">👥 ${g.players}</div>
            </div>
          </div>
        </div>`;
    });

    // Filter sidebar
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
</body>
  </html>
